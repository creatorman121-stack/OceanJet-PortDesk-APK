        setItem:(k,v)=>{mem[k]=String(v)},

      configurable:true
    });

let DB = (() => {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || '{}') || {}; }
  catch (e) { return {}; }
})();
(function mergeDefaults() {
    for (let key of Object.keys(DEFAULT_DB)) {
        if (!(key in DB)) { DB[key] = DEFAULT_DB[key]; continue; }
        if (typeof DEFAULT_DB[key] === 'object' &&!Array.isArray(DEFAULT_DB[key])) {
            for (let subKey of Object.keys(DEFAULT_DB[key])) {
                if (!(subKey in DB[key])) DB[key][subKey] = DEFAULT_DB[key][subKey];
            }
        }
    }
})();
if (!DB.aiSettings) DB.aiSettings = { apiKey: '', useAI: true };

const saveDB = () => {
  try { localStorage.setItem(DB_KEY, JSON.stringify(DB)); }
  catch (e) { /* StorageBridge/IndexedDB will still receive the save below. */ }
  try {
    if (window.OceanJetStorageBridge && typeof window.OceanJetStorageBridge.autoSave === 'function') {
      window.OceanJetStorageBridge.autoSave(DB);
    }
  } catch (e) { /* keep the core calculator flow alive even if storage fallback fails */ }
};
const $ = id => document.getElementById(id);
const fmtPHP = n => '₱' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
const safeId = str => str.replace(/[^a-zA-Z0-9]/g, '_');

function slabCost(E, rates) {
  const [r0, r1, r2] = rates;
  let t1 = Math.min(E, 10), rem = E - t1;
  let t2 = Math.min(Math.max(rem, 0), 30), rem2 = rem - t2;
  let t3 = Math.max(rem2, 0);
  return { t1, t2, t3, c1: t1*r0, c2: t2*r1, c3: t3*r2, total: t1*r0 + t2*r1 + t3*r2 };
}

function updateDashboard() {
  const s = DB.stats;
  $('statTrans').textContent = s.transactions;
  $('statRev').textContent = fmtPHP(s.revenue);
  $('statKg').textContent = s.totalKg + 'kg';
  $('statTop').textContent = s.topRoute || '--';
  const search = ($('dashSearch')?.value || '').toLowerCase();
  const rec = DB.comps.slice(-20).reverse().filter(c =>
  !search || c.route.toLowerCase().includes(search) || fmtPHP(c.total).includes(search)
  ).slice(0,5);
  $('recentList').innerHTML = rec.length? rec.map(c => `
    <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:0.8rem">
      <span style="color:var(--accent)">${c.route.toUpperCase()}</span> | ${c.mode} | ${c.pax||1}pax | ${c.weight}kg → <b>${fmtPHP(c.total)}</b>
    </div>
  `).join('') : '<p style="color:var(--text3)">No matching transactions</p>';
  
  // AI Load Predictor
  const coreRoutes = ['cebu_tagbilaran','cebu_ormoc','cebu_palompon','cebu_dumaguete','cebu_surigao','cebu_siquijor'];
  const day = new Date().getDay();
  const isWeekend = day===0 || day===6;
  const mult = isWeekend ? 1.3 : 1.0;
  const preds = coreRoutes.map(k => {
    const sched = DB.schedules[k];
    const trips = sched ? sched.trips.length : 0;
    const base = trips * 28;
    const hist = DB.comps.filter(c => c.route===k).length;
    const score = Math.round((base + hist*5) * mult);
    return {k, name: k.split('_')[1].toUpperCase(), score, trips};
  }).sort((a,b)=>b.score-a.score).slice(0,3);
  const predEl = $('aiPredictor');
  if (predEl) {
    predEl.innerHTML = preds.map(p => {
      const pct = Math.min(100, Math.round(p.score/ (preds[0].score||1)*100));
      return `<div style="margin:6px 0"><div style="display:flex;justify-content:space-between"><b>${p.name}</b><span>${p.score} est. bags</span></div><div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--accent),#ff9f43)"></div></div><div style="font-size:0.7rem;color:var(--text3)">${p.trips} trips today • ${isWeekend?'Weekend boost':'Weekday'}</div></div>`;
    }).join('');
  }

  drawMiniChart();
}

function drawMiniChart() {
  const canvas = $('miniChart'); if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const counts = DB.stats.routeCounts || {};
  const routes = Object.keys(counts).sort((a,b) => counts[b]-counts[a]).slice(0,5);
  const values = routes.map(k => counts[k]);
  const max = Math.max(...values, 1);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const barW = (canvas.width / Math.max(routes.length,1)) - 8;
  routes.forEach((route, i) => {
    const h = (values[i]/max)*80;
    ctx.fillStyle = '#f43f5e';
    ctx.fillRect(i*(barW+8), 100-h, barW, h);
    ctx.font = '8px sans-serif'; ctx.fillStyle = '#edeffc';
    ctx.fillText(route.substring(0,5), i*(barW+8), 115);
  });
}

function getCalcParams() {
  return {

  };

let lastReceiptText = '';

function compute(override = null) {
  const p = override || getCalcParams();
  const { route, mode, cls, pax, weight, rounding } = p;
  const free = mode === 'normal'? DB.freeAllowance[cls] : 0;
  const freeTotal = free * pax;
  let excess = weight - freeTotal;
  if (excess < 0) excess = 0;
  let E = mode === 'normal'? excess / pax : weight;
  if (rounding === 'floor') E = Math.floor(E);
  const slab = slabCost(E, DB.slabs[route][mode]);
  const perPax = slab.total;
  const total = mode === 'normal'? perPax * pax : perPax;

  const steps = [
    `Free: ${free}kg × ${pax}pax = ${freeTotal}kg`,
    `Excess: ${weight}kg → ${excess.toFixed(1)}kg`,
    `E/pax: ${excess.toFixed(1)} ÷ ${pax} = ${E.toFixed(2)}kg`
  ];
  if (slab.t1>0) steps.push(`Tier1: ${slab.t1.toFixed(1)}kg × ₱${DB.slabs[route][mode][0]} = ₱${slab.c1.toFixed(2)}`);
  if (slab.t2>0) steps.push(`Tier2: ${slab.t2.toFixed(1)}kg × ₱${DB.slabs[route][mode][1]} = ₱${slab.c2.toFixed(2)}`);
  if (slab.t3>0) steps.push(`Tier3: ${slab.t3.toFixed(1)}kg × ₱${DB.slabs[route][mode][2]} = ₱${slab.c3.toFixed(2)}`);
  steps.push(`Per pax: ₱${perPax.toFixed(2)}`);
  steps.push(`Total: ${fmtPHP(total)}`);

  $('totalDisplay').textContent = fmtPHP(total);
  $('perPaxDisplay').textContent = mode==='normal'? `₱${perPax.toFixed(2)} per passenger` : 'Fragile cargo';
  $('stepsDisplay').innerHTML = steps.map(s => `<div>• ${s}</div>`).join('');
  $('resultCard').style.display='block';

  const receiptHtml = `

function cashierAdjust() {
  const p = getCalcParams();
  if (p.mode === 'fragile') {
    let w = p.weight;
    if (w <= 0) { toast('Enter weight first'); return; }
    for (let testW = Math.floor(w)-1; testW >= 0; testW--) {
      let slab = slabCost(testW, DB.slabs[p.route].fragile);
      let tot = slab.total;
      if (Math.abs(tot % 1) < 0.001 && tot > 0) {
        $('weight').value = testW;
        compute();
        toast(`Adjusted to ${testW}kg → ${fmtPHP(tot)}`);
        return;
      }
    }
    toast('No whole-peso total found for Fragile');
    return;
  }
  const free = DB.freeAllowance[p.cls] * p.pax;
  let excess = p.weight - free;
  if (excess <= 0) { toast('No excess to adjust'); return; }
  for (let e = Math.floor(excess)-1; e>=0; e--) {
    let testW = e + free;
    let E = e / p.pax;
    let slab = slabCost(E, DB.slabs[p.route].normal);
    let tot = slab.total * p.pax;
    if (Math.abs(tot % 1) < 0.001) {
      $('weight').value = testW;
      compute();
      toast(`Adjusted to ${testW}kg → ${fmtPHP(tot)}`);
      return;
    }
  }
  toast('No whole-peso total found');
}

function importDatabase(e) {

  if (window.OceanJetStorageBridge && typeof window.OceanJetStorageBridge.importBackup === 'function') {
    return window.OceanJetStorageBridge.importBackup(file);
  }
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const restored = data && data.data ? data.data : data;
      if (!restored.slabs) throw new Error('Invalid');
      Object.assign(DB, restored); saveDB(); toast('Restored'); location.reload();
    } catch { toast('Invalid file'); }
  };
  reader.readAsText(file);
}

async function sendAIChat() {
  const q = $('chatInput').value.trim();

  $('sendBtn').disabled = true;

  let response = '';

    try {
      response = await fetchGeminiResponse(q, chatContext);
      removeLoading(loading);

    } catch {
      removeLoading(loading);
      response = aiOfflineRespond(q);
    }
  } else {
    response = aiOfflineRespond(q);
  }

  addChatMsg('bot', response);
  chatContext.push({ role:'user', content:q });
  chatContext.push({ role:'assistant', content:response });
  $('sendBtn').disabled = false;
}

async function fetchGeminiResponse(query, context) {
  const apiKey = DB.aiSettings.apiKey;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
  const systemPrompt = `You are the official AI assistant for Ocean Fast Ferries (Cebu, Philippines).
Routes: Tagbilaran, Ormoc, Palompon, Dumaguete, Surigao, Getafe, Siquijor.
Baggage slabs: ${JSON.stringify(DB.slabs)}. Passenger fares: ${JSON.stringify(DB.paxFares)}.
Answer in a friendly, helpful tone. Always compute baggage fees using the slab rates if asked.
If you don't know something, say you'll connect to a human agent. Keep replies short.`;
  const recentContext = context.slice(-6).map(c => `${c.role}: ${c.content}`).join('\n');
  const body = {
    contents: [{ parts: [{ text: `${systemPrompt}\n\nPrevious chat:\n${recentContext}\nUser: ${query}` }] }],
    generationConfig: { temperature: 0.4, maxOutputTokens: 512 }
  };
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(8000)
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    return text? text.trim() : null;
  } catch {
    return null;
  }
}

function aiOfflineRespond(q) {
  const ql = q.toLowerCase();
  if (/^(hi|hello|hey)/i.test(ql)) return "Hello! 👋 I'm the Ocean Fast Ferries genius AI. Ask me anything about baggage, fares, schedules, connections, or even tourist tips.";
  if (/thank(s| you)/i.test(ql)) return "You're very welcome! 😊 Need anything else?";
  if (/bye|good night|see you/i.test(ql)) return "Safe travels! ⛴ Goodbye!";
  if (ql.includes('help') || ql.includes('what can you')) return "I can:\n• Compute baggage fees (e.g., 'Price 2 pax 45kg Ormoc')\n• Show passenger fares\n• Display trip schedules\n• Explain connections (e.g., Cebu→Siquijor)\n• Tourist info\nJust ask naturally!";
  let calcMatch = q.match(/(\d+)\s*(?:pax|passengers?)?\s*(\d+\.?\d*)\s*(?:kg|kilos?)?\s*([a-zA-Z\s-]+)/i);
  if (!calcMatch) calcMatch = q.match(/(?:compute|calculate|how much|cost|price|fee)\s+(?:for\s+)?(\d+)\s*(?:pax|passengers?)?\s*(\d+\.?\d*)\s*(?:kg|kilos?)?\s*([a-zA-Z\s-]+)/i);
  if (calcMatch &&!isNaN(+calcMatch[1]) &&!isNaN(+calcMatch[2])) {
    const pax = +calcMatch[1], kg = +calcMatch[2], rw = calcMatch[3].toLowerCase().trim();
    const route = Object.keys(DB.slabs).find(r => rw.includes(r) || r.includes(rw));
    if (!route) return `I don't recognize route "${rw}". Available: ${Object.keys(DB.slabs).join(', ')}.`;
    const free = DB.freeAllowance.tourist;
    const excess = Math.max(0, kg - free*pax);
    const E = excess/pax;
    const total = slabCost(E, DB.slabs[route].normal).total * pax;
    return `📊 Normal baggage ${route.toUpperCase()}:\nPassengers: ${pax}\nWeight: ${kg}kg\nFree (tourist): ${free}kg×${pax}=${free*pax}kg\nExcess: ${excess.toFixed(1)}kg\nExcess/pax: ${E.toFixed(2)}kg\n\n💵 Total fee: ${fmtPHP(total)}`;
  }
  if (/\b(fare|ticket|price|cost)\b/i.test(q)) {
    for (let routeName of Object.keys(DB.paxFares)) {
      const simple = routeName.replace(/[^a-z ]/gi,' ').toLowerCase().trim();
      if (q.includes(simple) || simple.split(' ').some(w => q.includes(w))) {
        let cls = 'TC/OA';
        if (/business|bc/i.test(q)) cls='BC';
        else if (/student|st/i.test(q)) cls='ST';
        else if (/military|mi/i.test(q)) cls='MI';
        const price = DB.paxFares[routeName][cls];
        if (price) return `Passenger fare ${routeName} (${cls}): ${fmtPHP(price)}`;
      }
    }
    return "Passenger fares (Tourist/TC):\n• Tagbilaran ₱1,000\n• Ormoc/Palompon ₱1,430\n• Dumaguete ₱2,170\n• Surigao ₱2,470\n• Getafe ₱585\n• Siquijor ₱1,200\nAsk for Business, Student, Military.";
  }
  if (/\b(schedule|trip|depart|time|vessel)\b/i.test(q)) {
    for (let routeKey of Object.keys(DB.schedules)) {
      if (q.includes(routeKey) || q.includes(DB.schedules[routeKey].title.toLowerCase())) {
        const sched = DB.schedules[routeKey];
        if (!sched.trips.length) return `No scheduled trips for ${sched.title} yet.`;
        return sched.trips.slice(0,6).map(t => `🕐 ${t.dep} → ${t.arr} (${t.vessel})${t.remarks?' - '+t.remarks:''}`).join('\n');
      }
    }
    return "Schedules available for: Tagbilaran, Ormoc, Getafe, Siquijor. Which route?";
  }
  if (/siquijor/i.test(q)) {
    if (q.includes('how to get') || q.includes('connection') || q.includes('go to')) {
      return "⛴ Cebu to Siquijor:\n• Direct ferry: OJ 788 (9:30 AM & 5:40 PM) - approx 3.5h\n• Via Tagbilaran: many trips, then connecting ferry (Tagbilaran→Siquijor, approx 1.5h). Total travel ~3.5h.\nFare (passenger) starts at ₱1,200.";
    }
    return "Siquijor route is available! Direct and via Tagbilaran. Fares start at ₱1,200 (Tourist). Ask for more details.";
  }
  if (/(free|allowance|free kg)/i.test(q)) return "Tourist: 10kg free per pax.\nBusiness: 20kg free per pax.";
  if (/(routes|destinations|where do you go)/i.test(q)) return "We sail to: Tagbilaran, Ormoc, Palompon, Dumaguete, Surigao, Getafe, and Siquijor.";
  if (/(ocean fast|about|company)/i.test(q)) return "Ocean Fast Ferries operates fast craft services in the Visayas region, connecting Cebu to major islands with reliable schedules. Baggage Pro is our intelligent management system.";
  if (/slab|rate per kg/i.test(q)) {
    let resp = "Slab rates (per kg) for normal baggage:\n";
    Object.entries(DB.slabs).forEach(([k,v])=> resp += `${k.toUpperCase()}: ${v.normal[0]} / ${v.normal[1]} / ${v.normal[2]}\n`);
    return resp;
  }
  return "I'm not sure how to answer that. Try:\n• 'Price 2 pax 30kg Tagbilaran'\n• 'Siquijor schedule'\n• 'Business fare to Ormoc'\n• 'Free allowance'\n• 'Help'";
}

<script>
(function(){

  const DB_KEY_SAFE = (typeof DB_KEY !== 'undefined') ? DB_KEY : 'off_baggage_v14';
  let nativeWriteQueue = Promise.resolve();
  let lastAutoSave = '';
  try { lastAutoSave = localStorage.getItem('oceanjet_last_autosave') || ''; } catch(e) {}
  let lastError = '';

  function safeLocalSet(key, value){
    try { localStorage.setItem(key, value); return true; } catch(e) { lastError = e.message || String(e); return false; }
  }
  function safeLocalGet(key){
    try { return localStorage.getItem(key); } catch(e) { return null; }
  }
  function safeLocalRemove(key){
    try { localStorage.removeItem(key); return true; } catch(e) { lastError = e.message || String(e); return false; }
  }

  function nowIso(){ return new Date().toISOString(); }
  function niceBytes(n){
    n = Number(n || 0);
    if (n < 1024) return n + ' B';
    if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
    return (n/1048576).toFixed(2) + ' MB';
  }
  function cap(){ return window.Capacitor || null; }
  function fs(){ return cap() && cap().Plugins && cap().Plugins.Filesystem; }
  function share(){ return cap() && cap().Plugins && cap().Plugins.Share; }
  function isNativeApp(){ return !!(cap() && typeof cap().isNativePlatform === 'function' && cap().isNativePlatform()); }
  function isCapacitorAvailable(){ return !!fs(); }
  function storageMode(){
    if (isNativeApp() && isCapacitorAvailable()) return 'Native Android Storage';
    if ('indexedDB' in window) return 'IndexedDB Browser Fallback';
    return 'localStorage Emergency Fallback';
  }
  function getDB(){
    try { if (typeof DB !== 'undefined') return DB; } catch(e) {}
    try { return JSON.parse(safeLocalGet(DB_KEY_SAFE) || '{}'); } catch(e) { return {}; }
  }
  function setDB(data){
    if (!data || typeof data !== 'object') throw new Error('Invalid database object');
    try { if (typeof DB !== 'undefined') { Object.assign(DB, data); } } catch(e) {}
    safeLocalSet(DB_KEY_SAFE, JSON.stringify(data));

    if (payload && payload.app === 'OceanJet PortDesk' && payload.data) return payload.data;
    return payload;
  }
  function makeBackup(){
    const data = getDB();
    return {
      version: VERSION,

  function downloadBlob(filename, content, type){
    const blob = new Blob([content], { type: type || 'application/json' });

  function openIDB(){
    return new Promise((resolve, reject)=>{
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE, { keyPath:'key' });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error || new Error('IndexedDB open failed'));
    });
  }
  async function idbPut(key, value){
    if (!('indexedDB' in window)) return safeLocalSet(key, JSON.stringify(value));
    const db = await openIDB();
    return new Promise((resolve, reject)=>{
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put({ key, value, updatedAt: nowIso() });
      tx.oncomplete = () => { db.close(); resolve(true); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  }
  async function idbGet(key){

      const tx = db.transaction(IDB_STORE, 'readonly');

      req.onsuccess = () => { db.close(); resolve(req.result ? req.result.value : null); };
      req.onerror = () => { db.close(); reject(req.error); };
    });
  }
  async function idbDelete(key){
    if (!('indexedDB' in window)) return safeLocalRemove(key);

    isCapacitorAvailable,
    isBrowserFallback: () => !isCapacitorAvailable(),
    async saveData(key, data){
      const json = JSON.stringify(data);
      const errors = [];
      let wrotePrimary = false;
      try { await idbPut(key, data); wrotePrimary = true; }
      catch(e) { errors.push('IndexedDB: ' + (e.message || String(e))); }
      if (!safeLocalSet(key, json)) errors.push('localStorage quota or permission issue');
      if (isCapacitorAvailable()) {
        try { await nativeWrite('OceanJet/' + key + '.json', JSON.stringify(data, null, 2)); wrotePrimary = true; }
        catch(e) { errors.push('Native storage: ' + (e.message || String(e))); }
      }
      lastError = errors.join(' | ');
      return wrotePrimary || errors.length === 0;
    },
    async loadData(key){
      try {
        if (isCapacitorAvailable()) {
          try { return JSON.parse(await nativeRead('OceanJet/' + key + '.json')); } catch(e) {}
        }
        const idb = await idbGet(key);
        if (idb !== undefined && idb !== null) return idb;
        const raw = safeLocalGet(key); return raw ? JSON.parse(raw) : null;
      } catch(e) { lastError = e.message || String(e); return null; }
    },
    async deleteData(key){
      const errors = [];
      safeLocalRemove(key);
      try { await idbDelete(key); } catch(e) { errors.push('IndexedDB delete: ' + (e.message || String(e))); }
      if (isCapacitorAvailable()) { try { await nativeDelete('OceanJet/' + key + '.json'); } catch(e){} }
      lastError = errors.join(' | ');
      return errors.length === 0;
    },
    autoSave(data){
      const payload = data || getDB();
      const json = JSON.stringify(payload);
      lastAutoSave = nowIso();
      safeLocalSet('oceanjet_last_autosave', lastAutoSave);
      safeLocalSet(DB_KEY_SAFE, json);
      idbPut(DB_KEY_SAFE, payload).catch(e => { lastError = e.message || String(e); });
      if (isCapacitorAvailable()) {
        nativeWriteQueue = nativeWriteQueue.then(()=>nativeWrite(MAIN_DB_FILE, JSON.stringify(makeBackup(), null, 2))).catch(e=>{ lastError = e.message || String(e); });
      }
      this.refreshStoragePanel && this.refreshStoragePanel();
      return true;
    },
    async exportBackup(){
      const backup = makeBackup();
      const stamp = new Date().toISOString().slice(0,16).replace(/[-:T]/g,'');
      const filename = `oceanjet-backup-${stamp}.json`;
      const json = JSON.stringify(backup, null, 2);
      try {
        if (isCapacitorAvailable()) {
          const path = BACKUP_PREFIX + stamp + '.json';
          const result = await nativeWrite(path, json);
          let shared = false;
          if (share() && result && result.uri) {
            try { await share().share({ title:'OceanJet Backup', text:'OceanJet PortDesk backup file created.', url:result.uri, dialogTitle:'Share OceanJet Backup' }); shared = true; } catch(e) {}
          }
          if (!isNativeApp() || !shared) downloadBlob(filename, json, 'application/json');
          if (typeof toast === 'function') toast(shared ? 'Backup saved and share-ready' : 'Backup saved');
        } else {
          downloadBlob(filename, json, 'application/json');
          if (typeof toast === 'function') toast('Backup downloaded');
        }
        lastError = '';
      } catch(e) {
        lastError = e.message || String(e);
        downloadBlob(filename, json, 'application/json');
        if (typeof toast === 'function') toast('Backup downloaded by browser fallback');
      }
      this.refreshStoragePanel && this.refreshStoragePanel();
    },
    async importBackup(file){
      if (!file) return;
      const text = await file.text();
      try {
        const payload = JSON.parse(text);
        const restored = normalizeBackup(payload);
        if (!restored || !restored.slabs) throw new Error('Invalid OceanJet backup');
        setDB(restored);
        await this.saveData(DB_KEY_SAFE, restored);
        if (isCapacitorAvailable()) await nativeWrite(MAIN_DB_FILE, JSON.stringify(makeBackup(), null, 2));
        if (typeof toast === 'function') toast('Backup restored');
        setTimeout(()=>location.reload(), 500);
      } catch(e) {
        lastError = e.message || String(e);
        if (typeof toast === 'function') toast('Invalid backup file');
      }
    },
    getStorageStatus(){
      const db = getDB();
      const json = JSON.stringify(db || {});
      return {
        version: VERSION,
        mode: storageMode(),
        native: isNativeApp() && isCapacitorAvailable(),
        capacitor: isCapacitorAvailable(),
        indexedDB: 'indexedDB' in window,
        lastAutoSave,
        size: niceBytes(json.length),
        transactions: db && db.stats ? (db.stats.transactions || 0) : ((db.history || []).length),
        receipts: (db.comps || []).length,
        claims: (db.claims || []).length,
        schedules: db.schedules ? Object.keys(db.schedules).length : 0,
        health: lastError ? 'Needs attention' : 'Healthy',
        error: lastError || ''
      };
    },
    async healthCheck(){
      try {
        const probe = { ok:true, time:nowIso(), mode:storageMode() };
        await this.saveData('oceanjet-storage-health', probe);
        const loaded = await this.loadData('oceanjet-storage-health');
        if (!loaded || !loaded.ok) throw new Error('Read/write probe failed');
        lastError = '';
        if (typeof toast === 'function') toast('Storage health check passed');
      } catch(e) {
        lastError = e.message || String(e);
        if (typeof toast === 'function') toast('Storage health needs attention');
      }
      this.refreshStoragePanel && this.refreshStoragePanel();
    },
    clearTemporaryCache(){
      try {
        safeLocalRemove('oceanjet-storage-health');
        idbDelete('oceanjet-storage-health').catch(()=>{});
        if (typeof toast === 'function') toast('Temporary cache cleared');
      } catch(e) { lastError = e.message || String(e); }
      this.refreshStoragePanel && this.refreshStoragePanel();
    },
    async hydrateFromBestStorage(){
      try {
        let payload = null;
        if (isCapacitorAvailable()) {
          try { payload = normalizeBackup(JSON.parse(await nativeRead(MAIN_DB_FILE))); } catch(e) {}
        }
        if (!payload) payload = await idbGet(DB_KEY_SAFE);
        if (payload && payload.slabs) {
          try { if (typeof DB !== 'undefined') Object.assign(DB, payload); } catch(e) {}
          safeLocalSet(DB_KEY_SAFE, JSON.stringify(payload));
          if (typeof updateDashboard === 'function') updateDashboard();
        }
      } catch(e) { lastError = e.message || String(e); }
    }
  };
  window.OceanJetStorageBridge = Bridge;

    el.innerHTML = `
      <div class="card glow">
        <div class="card-header">💾 Storage / Backup Center</div>
        <div style="font-size:.8rem;color:var(--text2);margin-bottom:10px">V136 keeps the native storage bridge, GitHub Pages fallback, and Android Capacitor-ready backup system active.</div>
        <div class="grid2">
          <div style="padding:10px;background:var(--bg-surface);border-radius:12px"><small>Storage Mode</small><br><b style="color:var(--accent)">${s.mode}</b></div>
          <div style="padding:10px;background:var(--bg-surface);border-radius:12px"><small>Health</small><br><b>${s.health}</b></div>
          <div style="padding:10px;background:var(--bg-surface);border-radius:12px"><small>Backup Size</small><br><b>${s.size}</b></div>
          <div style="padding:10px;background:var(--bg-surface);border-radius:12px"><small>Last Auto-save</small><br><b>${s.lastAutoSave ? new Date(s.lastAutoSave).toLocaleString() : 'Not yet'}</b></div>

          <div style="padding:10px;background:var(--bg-surface);border-radius:12px"><small>Receipts / Logs</small><br><b>${s.receipts}</b></div>
          <div style="padding:10px;background:var(--bg-surface);border-radius:12px"><small>Claims</small><br><b>${s.claims}</b></div>
          <div style="padding:10px;background:var(--bg-surface);border-radius:12px"><small>Schedule Routes</small><br><b>${s.schedules}</b></div>
        </div>
        ${s.error ? `<div style="margin-top:10px;padding:10px;border:1px solid #f43f5e;border-radius:12px;color:#fb7185;font-size:.8rem">⚠ ${s.error}</div>` : ''}
        <div class="grid2" style="margin-top:12px">
          <button class="primary block" onclick="OceanJetStorageBridge.exportBackup()">📥 Backup to Phone</button>
          <label class="accent block" style="cursor:pointer;text-align:center;padding:10px;border-radius:10px">📤 Restore Backup<input type="file" accept=".json,application/json" hidden onchange="OceanJetStorageBridge.importBackup(this.files[0])"></label>
          <button class="block" onclick="OceanJetStorageBridge.exportBackup()">⬇ Export JSON</button>

          <button class="block" onclick="OceanJetStorageBridge.autoSave()">💽 Force Auto-save</button>
          <button class="block danger" onclick="OceanJetStorageBridge.clearTemporaryCache()">🧹 Clear Temporary Cache</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header">📱 Android Wrapper Notes</div>
        <div style="font-size:.78rem;color:var(--text2);line-height:1.55">
          Native mode activates automatically inside a Capacitor Android build using <b>com.oceanjet.portdesk</b>. On GitHub Pages, the same controls use IndexedDB plus downloadable JSON backup files.
        </div>
      </div>`;
  };

  Bridge.refreshStoragePanel = function(){
    const active = document.getElementById('view-storage');
    if (active && active.classList.contains('active') && typeof window.buildStorageCenter === 'function') window.buildStorageCenter();
  };

  window.addEventListener('beforeunload', function(){
    try { Bridge.autoSave(getDB()); } catch(e) {}
  });
  document.addEventListener('DOMContentLoaded', function(){
    Bridge.hydrateFromBestStorage().then(()=>Bridge.autoSave(getDB()));
  });
})();
</script>

  function minutesFromTime(value){
    const raw = String(value || '').trim().toLowerCase().replace(/\s+/g,'');
    const m = raw.match(/^(\d{1,2})(?::(\d{2}))?(am|pm)?$/);
    if (!m) return null;
    let h = parseInt(m[1],10), min = parseInt(m[2] || '0',10), ap = m[3];
    if (ap === 'pm' && h < 12) h += 12;
    if (ap === 'am' && h === 12) h = 0;
    return h * 60 + min;
  }
  function nextTrip(routeKey){
    const d = db();
    const now = new Date();
    const current = now.getHours()*60 + now.getMinutes();
    const pool = [];
    Object.entries(d.schedules || {}).forEach(([key, sched]) => {
      if (routeKey && key !== routeKey) return;
      (sched.trips || []).forEach(t => {
        const mins = minutesFromTime(t.dep);
        if (mins == null) return;
        let diff = mins - current;
        let dayLabel = 'Today';
        if (diff < 0) { diff += 1440; dayLabel = 'Tomorrow'; }
        pool.push({ route:key, sched, trip:t, mins, diff, dayLabel });
      });
    });
    return pool.sort((a,b)=>a.diff-b.diff)[0] || null;
  }
  function dataSummary(){
    const d = db();

  function drawHeatmap(){
    const canvas = byId('v135Heatmap'); if (!canvas || !canvas.getContext) return;

<script>

  function roughSize(obj){ try { return new Blob([JSON.stringify(obj||{})]).size; } catch(e){ return 0; } }
  function fmtSize(bytes){ if (!bytes) return '0 B'; const units=['B','KB','MB','GB']; let n=bytes,i=0; while(n>=1024 && i<units.length-1){n/=1024;i++;} return (i ? n.toFixed(1) : Math.round(n)) + ' ' + units[i]; }
  function v136MinutesFromTime(value){
    const raw = String(value || '').trim().toLowerCase().replace(/\s+/g,'');
    const m = raw.match(/^(\d{1,2})(?::(\d{2}))?(am|pm)?$/);
    if (!m) return null;
    let h = parseInt(m[1],10), min = parseInt(m[2] || '0',10), ap = m[3];
    if (ap === 'pm' && h < 12) h += 12;
    if (ap === 'am' && h === 12) h = 0;
    if (!ap && h === 24) h = 0;

    return (h % 24) * 60 + min;

    let hh = h % 12; if (hh === 0) hh = 12;
    return hh + ':' + String(m).padStart(2,'0') + ap;
  }
  function allTripRows(routeKey){

        const depMin = v136MinutesFromTime(trip.dep);

    const rev = Number(stats.revenue || 0);

  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', v136Boot); else v136Boot();
})();

        ${(v137State.warnings || []).length ? `<div class="v137-problems">${v137State.warnings.map(w=>`<div class="warn">⚠ ${v137Esc(w)}</div>`).join('')}</div>` : ''}
      </div>`;
  }
  function renderPreview(){
    const draft = v137State.draft;
    const counts = draft ? draft.counts || configCounts(draft) : {};
    v137ById('v137-panel').innerHTML = `
      <div class="v137-grid">
        <div class="card"><div class="card-header">🧪 Draft Preview</div>
          ${draft ? `${renderPill('Version', draft.version || 'No version label', draft.valid ? 'ok' : 'warn')}${renderPill('Categories', (draft.categories || []).join(', ') || 'None', '')}${renderPill('Fare routes', counts.fares || 0, '')}${renderPill('Schedule trips', counts.trips || 0, '')}` : '<div class="v137-note">Fetch, paste, or import JSON first.</div>'}
          ${renderProblems(draft)}
          <div class="v137-actions"><button class="primary" onclick="OceanJetConfigCenter.applyDraft()" ${draft && draft.valid ? '' : 'disabled'}>Apply Draft</button><button onclick="OceanJetConfigCenter.clearDraft()">Clear Draft</button></div>
        </div>
        <div class="card"><div class="card-header">📤 Import / Paste JSON</div>
          <textarea id="v137-json-input" class="v137-textarea" placeholder='Paste manifest JSON here. Example: {"version":"June 8","fares":{...},"schedules":{...}}'></textarea>
          <div class="v137-actions"><button class="accent" onclick="OceanJetConfigCenter.parseText()">Validate Pasted JSON</button><label class="v137-upload">Import JSON<input type="file" accept=".json,application/json" hidden onchange="OceanJetConfigCenter.importFile(this.files[0]); this.value='';"></label></div>
        </div>
      </div>`;
  }
  function renderVersions(meta, counts){
    const snapshots = Array.isArray(v137Db().configSnapshots) ? v137Db().configSnapshots : [];
    const warnings = [];
    if (!meta.lastApplied) warnings.push('No remote config has been applied yet. The app is using built-in/local data.');
    if (!meta.fareVersion || /built-in|local/i.test(meta.fareVersion)) warnings.push('Fare version is not linked to a remote release label.');
    if (!meta.scheduleVersion || /built-in|local/i.test(meta.scheduleVersion)) warnings.push('Schedule version is not linked to a remote release label.');
    v137ById('v137-panel').innerHTML = `
      <div class="card"><div class="card-header">🧾 Fare & Schedule Version Control</div>
        <div class="v137-pillrow">${renderPill('Active config', meta.activeVersion || 'Local', '')}${renderPill('Fare version', meta.fareVersion || 'Built-in', '')}${renderPill('Schedule version', meta.scheduleVersion || 'Built-in', '')}${renderPill('Categories', (meta.categories || []).join(', ') || 'Local defaults', '')}</div>
        <div class="v137-pillrow">${renderPill('Fare routes', counts.fares, '')}${renderPill('Baggage slab routes', counts.slabs, '')}${renderPill('Schedule routes', counts.schedules, '')}${renderPill('Total trips', counts.trips, '')}</div>
        ${warnings.length ? `<div class="v137-problems">${warnings.map(w=>`<div class="warn">⚠ ${v137Esc(w)}</div>`).join('')}</div>` : '<div class="v137-ok">✅ Version labels look ready for operations.</div>'}
      </div>
      <div class="card"><div class="card-header">🧯 Last Safe Snapshots</div>
        ${snapshots.length ? snapshots.map((s,i)=>`<div class="v137-snapshot"><b>#${i+1} ${v137Esc(shortDate(s.createdAt))}</b><small>${v137Esc((s.meta && s.meta.activeVersion) || 'Previous local config')}</small></div>`).join('') : '<div class="v137-note">No snapshots yet. A snapshot is created automatically before applying a new config.</div>'}
        <div class="v137-actions"><button onclick="OceanJetConfigCenter.exportCurrent()">Export Current Config</button><button class="danger" onclick="OceanJetConfigCenter.restoreBuiltIn()">Restore Built-in Defaults</button></div>
      </div>`;
  }
  function installStyle(){
    if (v137ById('v137-style')) return;
    const style = document.createElement('style');
    style.id = 'v137-style';
    style.textContent = `
      .v137-hero{background:linear-gradient(145deg,rgba(34,211,238,.18),rgba(16,185,129,.12),rgba(99,102,241,.12));border:1px solid rgba(255,255,255,.14);overflow:hidden}.v137-title{font-size:1.22rem;font-weight:950}.v137-sub{font-size:.78rem;color:var(--text2);line-height:1.5;margin-top:5px}.v137-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:10px 0 12px}.v137-tabs button{font-size:.7rem;padding:9px 6px;justify-content:center}.v137-tabs button.active{background:linear-gradient(135deg,#22d3ee,#10b981);color:#fff;border-color:transparent}.v137-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.v137-pillrow{margin-top:8px}.v137-pill{display:inline-flex;flex-direction:column;gap:1px;min-width:95px;max-width:100%;padding:7px 9px;margin:3px;border-radius:14px;background:var(--bg-surface);border:1px solid var(--border);vertical-align:top}.v137-pill small{font-size:.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:.7px}.v137-pill b{font-size:.74rem;color:var(--text);word-break:break-word}.v137-pill.hot{border-color:#22d3ee}.v137-pill.ok{border-color:#22c55e}.v137-pill.warn{border-color:#f59e0b}.v137-note{font-size:.78rem;color:var(--text2);line-height:1.55;padding:10px;border-radius:13px;background:var(--bg-surface);border:1px solid var(--border)}.v137-ok{margin-top:8px;padding:10px;border:1px solid #22c55e;border-radius:13px;color:#bbf7d0;font-size:.78rem}.v137-problems{margin-top:8px;display:flex;flex-direction:column;gap:6px}.v137-problems .bad,.v137-problems .warn{padding:8px;border-radius:12px;font-size:.74rem;line-height:1.35}.v137-problems .bad{border:1px solid #f43f5e;color:#fecdd3;background:rgba(244,63,94,.08)}.v137-problems .warn{border:1px solid #f59e0b;color:#fde68a;background:rgba(245,158,11,.08)}.v137-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}.v137-actions button,.v137-upload{width:100%;text-align:center;justify-content:center}.v137-upload{display:block;padding:10px;border-radius:10px;background:var(--bg-surface);border:1px solid var(--border);font-weight:700;cursor:pointer}.v137-sourcegrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.v137-textarea{width:100%;min-height:180px;background:var(--bg-surface);color:var(--text);border:1px solid var(--border);border-radius:14px;padding:10px;font-size:.76rem;line-height:1.45}.v137-check{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--text2);margin-top:8px}.v137-snapshot{padding:9px;border-radius:12px;background:var(--bg-surface);border:1px solid var(--border);margin:6px 0}.v137-snapshot b{display:block;font-size:.78rem}.v137-snapshot small{color:var(--text2);font-size:.68rem}@media(max-width:430px){.v137-tabs{grid-template-columns:1fr 1fr}.v137-grid,.v137-sourcegrid,.v137-actions{grid-template-columns:1fr}.v137-title{font-size:1.05rem}.v137-pill{min-width:calc(50% - 10px)}}`;
    document.head.appendChild(style);
  }
  function installView(){
    const app = document.querySelector('.app');
    if (app && !v137ById('view-config')) { const view = document.createElement('div'); view.id = 'view-config'; view.className = 'view'; app.appendChild(view); }
  }
  function v137InstallDrawerPatch(){
    if (window.__v137DrawerPatch) return; window.__v137DrawerPatch = true;
    const previous = window.buildDrawerMenu;
    window.buildDrawerMenu = function(){
      if (typeof previous === 'function') previous.apply(this, arguments);
      const menu = v137ById('drawerMenu');
      if (!menu || menu.querySelector('[data-view="config"]') || !isSupervisor()) return;
      const item = '<div class="drawer-item" data-view="config" onclick="navigate(\'config\')"><i>🛰️</i> Config Center</div>';
      const admin = menu.querySelector('[data-view="admin"]');
      if (admin) admin.insertAdjacentHTML('afterend', item); else menu.insertAdjacentHTML('beforeend', item);
    };
  }
  function v137InstallShowPatch(){
    if (window.__v137ShowPatch) return; window.__v137ShowPatch = true;
    const previous = window.showView;
    window.showView = function(name){
      installView();
      if (typeof previous === 'function') previous.apply(this, arguments);
      if (name === 'config') renderConfigCenter('dashboard');
    };
  }
  async function saveSources(){ collectSourceInputs(); await saveState(); toastSafe('Config sources saved'); renderConfigCenter('sources'); }
  async function resetSources(){ v137State.sources = mergeSources(); v137State.warnings = []; await saveState(); toastSafe('Source fields reset'); renderConfigCenter('sources'); }
  async function clearDraft(){ v137State.draft = null; try { localStorage.removeItem(DRAFT_KEY); } catch(e) {} try { if (bridge() && bridge().deleteData) await bridge().deleteData(DRAFT_KEY); } catch(e) {} await saveState(); renderConfigCenter('preview'); }
  async function restoreBuiltIn(){
    if (!isSupervisor()) return toastSafe('Supervisor access required');
    if (!window.DEFAULT_DB) return toastSafe('Built-in defaults unavailable');
    if (!confirm('Restore built-in fares, slabs, and schedules? Current config will be snapshotted first.')) return;
    await applyConfig({ version:'Built-in restored ' + new Date().toLocaleDateString(), fareVersion:'Built-in fare table', scheduleVersion:'Built-in schedule table', fares:clone(window.DEFAULT_DB.paxFares || {}), slabs:clone(window.DEFAULT_DB.slabs || {}), schedules:clone(window.DEFAULT_DB.schedules || {}) }, 'Built-in defaults');
  }
  async function autoFetchIfReady(){
    if (!isSupervisor()) return;
    const s = mergeSources(v137State.sources);
    if (!s.autoFetch) return;
    if (v137State.__autoFetchedSession) return;
    if (!s.manifestUrl && !s.baseUrl) return;
    v137State.__autoFetchedSession = true;
    await fetchRemoteConfig();
  }
  window.OceanJetConfigCenter = {
    version: V137_VERSION,
    render: renderConfigCenter,
    fetchRemote: fetchRemoteConfig,
    parseText: parseManualInput,
    importFile: importConfigFile,
    applyDraft: () => v137State.draft ? applyConfig(v137State.draft, 'Draft preview') : toastSafe('No draft to apply'),
    clearDraft,
    saveSources,
    resetSources,
    exportCurrent: exportCurrentConfig,
    downloadSample: () => downloadJson('oceanjet-config-sample-v137.json', sampleManifest()),
    restoreBuiltIn,
    getState: () => clone(v137State),
    validate: normalizeConfig
  };
  installStyle(); installView(); v137InstallDrawerPatch(); v137InstallShowPatch();
  hydrateState().then(()=>{ if (window.currentRole) { try { window.buildDrawerMenu && window.buildDrawerMenu(); } catch(e) {} autoFetchIfReady(); } });
})();
</script>
<!-- End V137 Professional Module -->
